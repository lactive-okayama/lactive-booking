name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy send-line-notify --project-ref wuthbgxzmvjeosugzfbs
          supabase functions deploy line-auth --project-ref wuthbgxzmvjeosugzfbs
          supabase functions deploy send-line-reminder --project-ref wuthbgxzmvjeosugzfbs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
