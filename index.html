<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lactive｜ご予約</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Supabase CDN> UMD ビルド：window.supabase を梺m実に設定） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ───────────────────────────────
       変数・リセット
    ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:        #FF8C42;
      --orange-light:  #FFE0C5;
      --orange-pale:   #FFF5ED;
      --orange-dark:   #E06010;
      --orange-deep:   #B84800;
      --blue:          #4A82A6;
      --blue-light:    #DFF0FA;
      --white:         #FFFFFF;
      --bg:            #FFFAF5;
      --text:          #2E1E0E;
      --text-light:    #8A6040;
      --border:        #EED4B0;
      --danger:        #D94040;
      --danger-bg:     #FDEAEA;
      --success:       #2E7D50;
      --success-bg:    #E5F5EC;
      --success-bd:    #9ACDB0;
      --shadow:        0 4px 20px rgba(0,0,0,0.08);
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.06);
      --radius:        14px;
      --radius-sm:     8px;
    }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      font-size: 15px;
    }

    /* ───────────────────────────────
       ヘッダー
    ─────────────────────────────── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--orange-light);
      padding: 0 20px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 10px rgba(255,140,66,.12);
    }
    .header-inner {
      max-width: 780px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px;
    }
    .logo { cursor: pointer; }
    .logo-name { font-size: 1.45rem; font-weight: 700; color: var(--orange-deep); letter-spacing: .08em; }
    .logo-sub  { font-size: .72rem; color: var(--text-light); letter-spacing: .1em; }
    .header-nav-btn {
      font-size: .82rem; font-weight: 600; color: var(--orange-deep);
      background: var(--orange-pale); border: 1.5px solid var(--orange-light);
      border-radius: 20px; padding: 7px 14px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all .18s;
    }
    .header-nav-btn:hover { background: var(--orange-light); border-color: var(--orange); }
    @media (max-width: 400px) { .header-nav-btn { font-size: .75rem; padding: 6px 10px; } }

    .visit-count-wrap {
      display: flex; align-items: center; gap: 7px; margin-top: 9px; flex-wrap: wrap;
    }
    .visit-count-label { font-size: .78rem; color: var(--text-light); }
    .visit-count-input {
      width: 64px; text-align: center; padding: 5px 6px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: .9rem; font-family: inherit; color: var(--text);
      transition: border-color .18s;
    }
    .visit-count-input:focus { border-color: var(--orange); outline: none; }
    .btn-visit-update {
      background: var(--orange-pale); color: var(--orange-dark);
      border: 1.5px solid var(--orange-light); font-size: .76rem;
      padding: 5px 11px; border-radius: var(--radius-sm);
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all .18s; white-space: nowrap;
    }
    .btn-visit-update:hover { background: var(--orange); color: #fff; border-color: var(--orange); }

    /* ───────────────────────────────
       ローディングオーバーレイ
    ─────────────────────────────── */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,.75); z-index: 999;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 4px solid var(--orange-light);
      border-top-color: var(--orange);
      animation: spin .8s linear infinite;
    }
    .loading-text { font-size: .88rem; color: var(--text-light); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───────────────────────────────
       メイン・ページ管理
    ─────────────────────────────── */
    main { max-width: 780px; margin: 0 auto; padding: 28px 18px 72px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ───────────────────────────────
       ステップバー
    ─────────────────────────────── */
    #steps-container { margin-bottom: 24px; }
    .steps-bar {
      display: flex; align-items: flex-start;
      justify-content: center; gap: 0;
    }
    .step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .step-circle {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; font-weight: 700; line-height: 1.2;
      text-align: center; flex-shrink: 0;
    }
    .step-circle.active  { background: var(--orange-deep); color: #fff; box-shadow: 0 0 0 3px rgba(255,140,66,.25); }
    .step-circle.done    { background: var(--orange); color: #fff; }
    .step-circle.pending { background: var(--border); color: var(--text-light); }
    .step-text { font-size: .65rem; color: var(--text-light); text-align: center; max-width: 52px; }
    .step-text.active-text { color: var(--orange-deep); font-weight: 700; }
    .step-line { flex: 1; height: 2px; background: var(--border); min-width: 18px; max-width: 60px; margin-top: 19px; }
    .step-line.done { background: var(--orange); }

    /* ───────────────────────────────
       セクションヘッダー
    ─────────────────────────────── */
    .section-block { margin-bottom: 32px; }
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .badge-tag {
      display: inline-block; font-size: .72rem; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
    }
    .badge-first  { background: var(--orange); color: #fff; }
    .badge-member { background: var(--blue); color: #fff; }
    .section-title { font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ───────────────────────────────
       メニューカード
    ─────────────────────────────── */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .menu-grid { grid-template-columns: 1fr; } }
    .menu-grid.single-col { grid-template-columns: 1fr; }

    .menu-card {
      background: var(--white); border-radius: var(--radius);
      padding: 20px 18px; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
      display: flex; flex-direction: column; gap: 6px;
    }
    .menu-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%; background: var(--orange);
    }
    .menu-card.member-card::before { background: var(--blue); }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .card-type-badge {
      font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    }
    .first-badge  { background: var(--orange-light); color: var(--orange-dark); }
    .member-badge { background: var(--blue-light); color: var(--blue); }
    .card-arrow { color: var(--border); font-size: 1.2rem; }
    .menu-card:hover .card-arrow { color: var(--orange); }
    .menu-card.member-card:hover .card-arrow { color: var(--blue); }

    .card-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .card-duration { font-size: .82rem; color: var(--text-light); }
    .card-price { font-size: 1.1rem; font-weight: 700; color: var(--orange-dark); margin-top: 2px; }

    /* ───────────────────────────────
       カード（白背景ボックス）
    ─────────────────────────────── */
    .card {
      background: var(--white); border-radius: var(--radius);
      padding: 28px; box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    @media (max-width: 480px) { .card { padding: 18px 14px; } }

    /* ───────────────────────────────
       ページタイトル
    ─────────────────────────────── */
    .page-title { text-align: center; margin-bottom: 24px; }
    .page-title h2 { font-size: 1.25rem; font-weight: 700; color: var(--orange-deep); margin-bottom: 5px; }
    .page-title p  { font-size: .86rem; color: var(--text-light); }

    /* ───────────────────────────────
       フォーム
    ─────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: .86rem; font-weight: 500;
      color: var(--text); margin-bottom: 6px;
    }
    .req { color: var(--danger); font-size: .78rem; margin-left: 3px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: .96rem; font-family: inherit; color: var(--text);
      background: var(--white); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,140,66,.18);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 460px) { .form-row { grid-template-columns: 1fr; } }

    /* ラジオ選択グループ */
    .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color .18s, background .18s;
    }
    .radio-item:hover { border-color: var(--orange); background: var(--orange-pale); }
    .radio-item input[type=radio] { accent-color: var(--orange); width: 16px; height: 16px; flex-shrink: 0; }
    .radio-item.selected { border-color: var(--orange); background: var(--orange-pale); }
    .radio-label { font-size: .9rem; color: var(--text); flex: 1; }

    /* 注意事項リスト */
    .notice-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
    .notice-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; background: var(--orange-pale);
      border-left: 3px solid var(--orange); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: .9rem; line-height: 1.6;
    }
    .notice-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* ───────────────────────────────
       ボタン
    ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 13px 28px; border: none; border-radius: 40px;
      font-size: .96rem; font-family: inherit; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .btn:disabled { opacity: .65; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #fff; box-shadow: 0 4px 14px rgba(255,140,66,.4);
    }
    .btn-primary:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(255,140,66,.5); }
    .btn-secondary {
      background: var(--white); color: var(--text-light);
      border: 1.5px solid var(--border);
*+    }
    .btn-secondary:not(:disabled):hover { border-color: var(--orange); color: var(--orange-deep); }
    .btn-danger {
      background: var(--danger-bg); color: var(--danger);
      border: 1.5px solid #F0A0A0; font-size: .8rem; padding: 7px 14px;
      border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-line { background: #06C755; color: #fff; box-shadow: 0 4px 14px rgba(6,199,85,.35); }
    .btn-line:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(6,199,85,.5); }
    .line-connect-box { background: #F0FFF5; border: 1.5px solid #06C755; border-radius: var(--radius); padding: 16px; margin-top: 20px; }
    .line-connect-title { font-weight: 700; font-size: .95rem; color: #059245; margin-bottom: 6px; }
    .line-connect-desc { font-size: .82rem; color: var(--text-light); margin-bottom: 12px; }
    .line-connect-done { font-size: .9rem; color: #059245; font-weight: 600; margin-bottom: 8px; }
    .btn-actions { display: flex; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
    .btn-actions .btn { flex: 1; min-width: 110px; }

    /* ───────────────────────────────
       アルート
    ─────────────────────────────── */
    .alert {
      padding: 11px 15px; border-radius: var(--radius-sm);

          <span><span class="holiday-legend-swatch" style="background:var(--orange-pale);border:1.5px solid var(--orange);"></span>選択中</span>
        </div>
        <div style="font-size:.78rem; color:var(--text-light); margin-top:8px;">※休業日は選択できません</div>
      </div>
      <div class="form-group">
        <label>希望時間<span class="req">*</span></label>
        <input type="hidden" id="dt-time" value="">
        <div id="time-slot-placeholder" class="time-slot-placeholder">
          ます希望日を選択してください
        </div>
        <div id="time-slot-loading" style="display:none; padding:14px; text-align:center; color:var(--text-light); font-size:.86rem;">
          ⏳ 確認中...
        </div>
        <div id="time-slot-grid" class="time-slot-grid" style="display:none;"></div>
      </div>
      <div class="form-group">
        <label>メモ・ご要望（任意）</label>
        <textarea id="dt-memo" placeholder="気になること、ご要望などがあればご記入ください"></textarea>
      </div>
      <div class="btn-actions">
        <button class="btn btn-secondary" onclick="datetimeBack()">← 戻る</button>
        <button class="btn btn-primary" id="booking-btn" onclick="submitBooking()">予約を確定する ✓</button>
      </div>
    </div>
  </div>

  <!-- ▼ 予約完了 -->
  <div id="page-done" class="page">
    <div class="card" style="text-align:center; padding:40px 28px;">
      <div class="done-icon">🌿</div>
      <div class="done-title">ご予約ありがとうございます</div>
      <div class="done-msg">当日お会いできるのを楽しみにしています！</div>
      <table class="done-table">
        <tr><td>お名前</td><td id="dn-name"></td></tr>
        <tr><td>メニュー</td><td id="dn-menu"></td></tr>
        <tr><td>希望日時</td><td id="dn-dt"></td></tr>
        <tr id="dn-id-row" style="display:none;"><td>顧客番号</td><td id="dn-id"></td></tr>
        <tr id="dn-memo-row" style="display:none;"><td>ご要望</td><td id="dn-memo"></td></tr>
      </table>
      <p style="font-size:.8rem;color:var(--text-light);margin-top:16px;line-height:1.8;">
        ご不明な点はお電話にてお問い合わせください。
      </p>
      <button class="btn btn-primary" style="margin-top:22px;" onclick="navigateTo('page-top')">トップに戻る</button>
    </div>
  </div>

  <!-- ▼ キャンセル：ログイン -->
  <div id="page-cancel-login" class="page">
    <div class="card">
      <div class="page-title">
        <h2>予約確認・キャンセル</h2>
        <p>6桁の顧客番号とお名前（姓）を入力してください</p>
      </div>
      <div id="cancel-login-alert" class="alert alert-error"></div>
      <div class="id-input-wrap">
        <input type="text" class="id-input" id="cancel-id-input"
               maxlength="6" placeholder="例：123456" autocomplete="off" inputmode="numeric"
               onkeydown="if(event.key==='Enter') document.getElementById('cancel-name-input').focus()">
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label>お名前（姓のみでOK）<span class="req">*</span></label>
        <input type="text" id="cancel-name-input" placeholder="例：山田"
               autocomplete="off"
               onkeydown="if(event.key==='Enter') verifyCancelLogin()">
      </div>
      <div class="btn-actions">
        <button class="btn btn-secondary" onclick="navigateTo('page-top')">← 戻る</button>
        <button class="btn btn-primary" id="cancel-verify-btn" onclick="verifyCancelLogin()">予約を確認する</button>
      </div>
    </div>
  </div>

  <!-- ▼ マイページ -->
  <div id="page-cancel-list" class="page">
    <div class="card">
      <div class="mypage-customer-bar">
        <span class="mypage-customer-name" id="mypage-customer-name"></span>
        <span class="mypage-customer-num"  id="mypage-customer-num"></span>
      </div>
      <div class="mypage-stats">
        <div class="stat-card">
          <div class="stat-num" id="mp-total">-</div>
          <div class="stat-label">総予約回数</div>
        </div>
        <div class="stat-card-sub-row">
          <div class="stat-card-sub">
            <div class="stat-num-sub" id="mp-seitai">-</div>
            <div class="stat-label-sub">整体 来院回数</div>
          </div>
          <div class="stat-card-sub">
            <div class="stat-num-sub" id="mp-pilates">-</div>
            <div class="stat-label-sub">ピラティス 来院回数</div>
          </div>
        </div>
      </div>
      <div id="mypage-success" class="alert alert-success"></div>
      <div id="mypage-alert"   class="alert alert-error"></div>
      <div class="mypage-tabs">
        <button class="tab-btn active" id="mypage-tab-btn-upcoming" onclick="switchMypageTab('upcoming', this)">今後の予約</button>
        <button class="tab-btn"        id="mypage-tab-btn-past"     onclick="switchMypageTab('past', this)">過去の予約</button>
      </div>
      <div id="mypage-tab-upcoming" class="tab-panel active">
        <div id="mypage-upcoming-list"></div>
      </div>
      <div id="mypage-tab-past" class="tab-panel">
        <div id="mypage-past-list"></div>
      </div>
      <div class="btn-actions" style="margin-top:20px;">
        <button class="btn btn-secondary" onclick="navigateTo('page-cancel-login')">← 戻る</button>
      </div>
    </div>

  <!-- ▼ 管理ログイン -->
  <div id="page-admin-login" class="page">
    <div style="max-width:380px;margin:0 auto;">
      <div class="page-title">
        <h2>管理画面ログイン</h2>
        <p>管理者パスワードを入力してください</p>
      </div>
      <div class="card">
        <div id="admin-login-alert" class="alert alert-error">パスワードが正しくありません。</div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="admin-pw" placeholder="パスワードを入力"
                 onkeydown="if(event.key==='Enter') adminLogin()">

        <div class="btn-actions">
          <button class="btn btn-secondary" onclick="navigateTo('page-top')">← 戻る</button>
          <button class="btn btn-primary" onclick="adminLogin()">ログイン</button>
        </div>
      </div>
    </div>
  </div>

  // 休業日設定
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let holidayViewYear  = null;
  let holidayViewMonth = null; // 0-11

  function initHolidayCalendar() {
    if (holidayViewYear === null) {
      const now = new Date();
      holidayViewYear  = now.getFullYear();
      holidayViewMonth = now.getMonth();
    }
    renderHolidayCalendar();
  }

  function changeHolidayMonth(delta) {
    holidayViewMonth += delta;
    if (holidayViewMonth < 0)  { holidayViewMonth = 11; holidayViewYear--; }
    if (holidayViewMonth > 11) { holidayViewMonth = 0;  holidayViewYear++; }
    renderHolidayCalendar();
  }

  /** 指定r#��休業日を取得（map: dateStr -> reason） */
  async function fetchHolidaysForMonth(year, month) {
    const mm  = String(month + 1).padStart(2, '0');
    const ld  = new Date(year, month + 1, 0).getDate();
    const start = `${year}-${mm}-01`;
    const end   = `${year}-${mm}-${String(ld).padStart(2, '0')}`;
    const { data, error } = await sbClient
      .from('holidays')
      .select('date, reason')
      .gte('date', start)
      .lte('date', end);
    if (error) throwSupabaseError('休業日一覧の取得', error);
    const map = {};
    (data || []).forEach(h => { map[h.date] = h.reason || ''; });
    return map;
  }

  async function renderHolidayCalendar() {
    document.getElementById('holiday-month-label').textContent =
      `${holidayViewYear}年${holidayViewMonth + 1}月`;
    const grid = document.getElementById('holiday-cal-grid');
    hideAlert('admin-holiday-error');

    let holidays = {};
    try {
      holidays = await fetchHolidaysForMonth(holidayViewYear, holidayViewMonth);
    } catch (e) {
      console.error('❌ [renderHolidayCalendar] エラー:', e);
      showAlert('admin-holiday-error', `休業日データの取得に失敗しました。${e.supabaseError ? '（' + e.supabaseError.code + '）' : ''}`);
    }

    const dows = ['日', '月', '火', '水', '木', '金', '土'];
    let html = '';
    dows.forEach((d, i) => {
      const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
      html += `<div class="holiday-cal-dow ${cls}">${d}</div>`;
    });

    const firstDow = new Date(holidayViewYear, holidayViewMonth, 1).getDay();
    const numDays  = new Date(holidayViewYear, holidayViewMonth + 1, 0).getDate();
    const today    = new Date();
    today.setHours(0, 0, 0, 0);

    for (let i = 0; i < firstDow; i++) {
      html += `<div class="holiday-cal-day empty"></div>`;
    }

    for (let d = 1; d <= numDays; d++) {
      const dateObj = new Date(holidayViewYear, holidayViewMonth, d);
      const mm      = String(holidayViewMonth + 1).padStart(2, '0');
      const dd      = String(d).padStart(2, '0');
      const dateStr = `${holidayViewYear}-${mm}-${dd}`;
      const isPast    = dateObj < today;
      const isToday   = dateObj.getTime() === today.getTime();
      const isHoliday = holidays[dateStr] !== undefined;

      const classes = ['holiday-cal-day'];
      if (isPast)    classes.push('past');
      if (isToday)   classes.push('today');
      if (isHoliday) classes.push('holiday');

      const onclick = isPast ? '' : `onclick="toggleHoliday('${dateStr}', this)"`;
      const reason  = isHoliday && holidays[dateStr]
        ? `<span class="holiday-day-reason">${esc(holidays[dateStr])}</span>` : '';
      html += `<div class="${classes.join(' ')}" ${onclick}>
        <span class="holiday-day-num">${d}</span>
        ${reason}
      </div>`;
    }

    grid.innerHTML = html;
  }

  async function toggleHoliday(dateStr, dayEl) {
    const isHoliday = dayEl.classList.contains('holiday');
    if (isHoliday) {
      if (!confirm(`${dateStr} の休業日設定を解除しますか？`)) return;
      showLoading('解除中...');
      try {
        const { error } = await sbClient.from('holidays').delete().eq('date', dateStr);
        if (error) throwSupabaseError('休業日の解除', error);
        await renderHolidayCalendar();
      } catch (e) {
        console.error('❌ [toggleHoliday/delete] エラー:', e);
        const detail = e.supabaseError ? `（${e.supabaseError.code}: ${e.supabaseError.message}）` : '';
        showAlert('admin-holiday-error', `休業日の解除に失敗しました。${detail}`);
      } finally {
        hideLoading();
      }
    } else {
      const reason = prompt(`${dateStr} を休業日に設定します。\n理由（任意・空欄でも可）：`, '');
      if (reason === null) return; // キャンセル
      showLoading('登録中...');
      try {
        const { data, error } = await sbClient
          .from('holidays')
          .insert({ date: dateStr, reason: reason.trim() || null })
          .select();
        if (error) throwSupabaseError('休業日の登録', error);
        if (!data || data.length === 0) {
          showAlert('admin-holiday-error',
            '休業日を登録できませんでした。Supabase の holidays テーブルに INSERT 用の RLS ポリシーが設定されているかご確認ください。');
          return;
        }
        await renderHolidayCalendar();
      } catch (e) {
        console.error('❌ [toggleHoliday/insert] エラー:', e);
        const detail = e.supabaseError ? `（${e.supabaseError.code}: ${e.supabaseError.message}）` : '';
        showAlert('admin-holiday-error', `休業日の登録に失敗しました。${detail}`);
      } finally {
        hideLoading();
      }
    }
  }

  /** 指定日が休業日にどうか確認 */
  async function checkIsHoliday(dateStr) {
    const { data, error } = await sbClient
      .from('holidays')
      .select('reason')
      .eq('date', dateStr)
      .maybeSingle();
    if (error) throwSupabaseError('休業日チェック', error);
    return data; // null なら休業日ではない
  }

  async function updateVisitCount(customerId) {
    const seitaiInput  = document.getElementById(`vc-seitai-${customerId}`);
    const pilatesInput = document.getElementById(`vc-pilates-${customerId}`);
    const seitaiCount  = parseInt(seitaiInput.value, 10);
    const pilatesCount = parseInt(pilatesInput.value, 10);
    if (isNaN(seitaiCount) || seitaiCount < 0 || isNaN(pilatesCount) || pilatesCount < 0) {
      showAlert('admin-customer-error', '正しい回数（0以上の整数）を入力してください。');
      return;
    }
    const visitCount = seitaiCount + pilatesCount;
    console.log('🔵 [updateVisitCount] UPDATE開始:', { customerId, seitaiCount, pilatesCount, visitCount });
    try {
      // .select() を付けることで RLS で UPDATE が拒否された場合（0行更新）を検知できる
      const { data, error } = await sbClient
        .from('customers')
        .update({ visit_count: visitCount, seitai_count: seitaiCount, pilates_count: pilatesCount })
        .eq('id', customerId)
        .select();

      if (error) {
        console.error('❌ [updateVisitCount] Supabaseエラー詳細:', {
          message: error.message,
          code:    error.code,
          details: error.details,
          hint:    error.hint,
          status:  error.status
        });
        const detail = error.code
          ? `（${error.code}: ${error.message}）`
          : `（${error.message}）`;
        showAlert('admin-customer-error', `来院回数の更新に失敗しました。${detail}`);
        return;
      }

      // RLS で UPDATE 権限がない場合、エラーは出ずに data が空配列で返ってくる
      if (!data || data.length === 0) {
        console.error('❌ [updateVisitCount] 0行更新（RLSのUPDATEポリシーは未設定の可能性）:', { customerId, seitaiCount, pilatesCount });
        showAlert(
          'admin-customer-error',
          '更新できませんでした。Supabase の customers テーブルに UPDATE 用の RLS ポリシーが設定されているかご確認ください。'
        );
        return;
      }

      console.log('✅ [updateVisitCount] UPDATE成功 保存行:', data);
      seitaiInput.style.borderColor  = 'var(--success)';
      pilatesInput.style.borderColor = 'var(--success)';
      setTimeout(() => {
        seitaiInput.style.borderColor  = '';
        pilatesInput.style.borderColor = '';
      }, 1500);
      hideAlert('admin-customer-error');
    } catch (e) {
      console.error('❌ [updateVisitCount] 予期せぬエラー:', e);
      showAlert('admin-customer-error', `来院回数の更新に失敗しました。（${e.message || '不明なエラー'}）`);
    }
  }

  async function toggleVisited(bookingId, customerNumber, checkbox) {
    const checked = checkbox.checked;
    const label   = checkbox.closest('.visited-check');
    checkbox.disabled = true; // 取不排刐防止)
    console.log('🔵 [toggleVisited] 開㧋:', { bookingId, customerNumber, checked });

    try {
      // ① bookings.visited を更新（.select() て更新詌を厖得し RLS の 0 題ブロックを椤知きづ）
      const { data: bData, error: bErr } = await sbClient
        .from('bookings')
        .update({ visited: checked })
        .eq('id', bookingId)
        .select();
      if (bErr) {
        console.error('❌ [toggleVisited] bookings UPDATE エラー:', bErr);
        throw new Error(`予約の更新失敗（${bErr.code || ''}: ${bErr.message}）`);
      }
      if (!bData || bData.length === 0) {
        console.error('❌ [toggleVisited] bookings 0 行更新（RLSブロックの可能性）');
        throw new Error('予約の更新に失敗しました。)bookings テーブルの UPDATE 用 RLS ポリシーをご確認ください。');
      }
      console.log('✅ [toggleVisited] bookings UPDATE 成功:', bData);

      // ② 顧客番号がある場合、customers.visit_count を増減
      if (customerNumber) {
        const { data: cust, error: cFetchErr } = await sbClient
          .from('customers')
          .select('id, visit_count, seitai_count, pilates_count')
          .eq('customer_number', customerNumber)
          .maybeSingle();
        if (cFetchErr) {
          console.error('❌ [toggleVisited] customers 取得エラー:', cFetchErr);
          throw new Error(`顧客情報の取得失敗（${cFetchErr.code || ''}: ${cFetchErr.message}）`);
        }
        if (!cust) {
          console.warn('⚠️ [toggleVisited] customer_number に該当する顧客が見つかりません:', customerNumber);
          // 顧客がいなくても予約のチェックは成功扱い
        } else {
          const menu       = (bData[0]?.menu || '');
          const isSeitai   = menu.includes('整体');
          const isPilates  = menu.includes('ピラティス');

          const curVisit   = cust.visit_count ?? 0;
          const newVisit   = checked ? curVisit + 1 : Math.max(0, curVisit - 1);

          const curSeitai  = cust.seitai_count ?? 0;
          const newSeitai  = isSeitai
            ? (checked ? curSeitai + 1 : Math.max(0, curSeitai - 1))
            : curSeitai;

          const curPilates = cust.pilates_count ?? 0;
          const newPilates = isPilates
            ? (checked ? curPilates + 1 : Math.max(0, curPilates - 1))
            : curPilates;

          console.log(`🔵 [toggleVisited] 更新: visit_count ${curVisit}→${newVisit}, seitai_count ${curSeitai}→${newSeitai}, pilates_count ${curPilates}→${newPilates}`);

          const { data: cData, error: cUpdateErr } = await sbClient
            .from('customers')
            .update({ visit_count: newVisit, seitai_count: newSeitai, pilates_count: newPilates })
            .eq('id', cust.id)
            .select();
          if (cUpdateErr) {
            console.error('❌ [toggleVisited] customers UPDATE エラー:', cUpdateErr);
            throw new Error(`来院回数の更新失敗（${cUpdateErr.code || ''}: ${cUpdateErr.message}）`);
          }
          if (!cData || cData.length === 0) {
            console.error('❌ [toggleVisited] customers 0 行更新（RLSブロックの可能性）');
            throw new Error('来院回数の更新に失敗しました。customers テーブルの UPDATE 用 RLS ポリシーをご確認ください。');
          }
          console.log('✅ [toggleVisited] visit_count/seitai_count/pilates_count UPDATE 成功:', cData);
        }
      } else {
        console.log('ℹ️ [toggleVisited] customer_number が空のため visit_count 更新はスキップ');
      }

      label.classList.toggle('checked-label', checked);
      hideAlert('admin-booking-error');

      // 顧客一覧タブが表示中なら自動更新
      if (document.getElementById('tab-customers').classList.contains('active')) {
        await renderCustomers();
      }
    } catch (e) {
      console.error('❌ [toggleVisited] 失敗:', e);
      checkbox.checked = !checked; // 失敗時は元に戻す
      showAlert('admin-booking-error', `来院済みの更新に失敗しました。${e.message ? '（' + e.message + '）' : ''}`);
    } finally {
      checkbox.disabled = false;
    }
  }

  /** Supabase エラーを日本語ログ付きで throw するヘルパー */
  function throwSupabaseError(label, sbError) {
    console.error(`❌ [${label}] Supabaseエラー詳細:`, {
      message: sbError.message,
      code:    sbError.code,
      details: sbError.details,
      hint:    sbError.hint,
      status:  sbError.status
    });
    const err = new Error(`${label}: ${sbError.message}`);
    err.supabaseError = sbError;
    throw err;
  }

  /** 顧客を customer_number で検索 */
  async function findCustomer(customerNumber) {
    console.log('🔵 [findCustomer] 検索中 customer_number:', customerNumber);
    const { data, error } = await sbClient
      .from('customers')
      .select('*')
      .eq('customer_number', customerNumber)
      .maybeSingle();
    if (error) throwSupabaseError('顧客情報の取得', error);
    console.log('🔵 [findCustomer] 結果:', data);
    return data; // null if not found
  }

  /** 既存の customer_number 一覧を取得して重複しない6桁番号を生成 */
  async function generateCustomerId() {
    console.log('🔵 [generateCustomerId] 既存顧客番号を取得中...');
    const { data, error } = await sbClient.from('customers').select('customer_number');
    if (error) throwSupabaseError('顧客番号一覧の取得', error);

    const existing = (data || []).map(c => c.customer_number);
    console.log('🔵 [generateCustomerId] 既存番号一覧:', existing);

    if (existing.length >= 900000) throw new Error('顧客番号が上限に達しています。');

    // 重複しない番号が確定するまでループ（100000〜999999 の範囲で生成）
    let id;
    let tries = 0;
    do {
      id = String(Math.floor(Math.random() * 900000) + 100000);
      tries++;
      if (tries > 5000) throw new Error('顧客番号の生成に失敗しました（試行上限）。');
    } while (existing.includes(id)); // ← 重複する限り必ず再生成
    console.log(`🔵 [generateCustomerId] 決定番号: ${id}（${tries}回試行）`);
    return id;
  }

  /** 顧客を保存（INSERT 後に保存行を返す） */
  async function saveCustomer(c) {
    console.log('🔵 [saveCustomer] INSERT開始:', c);
    const { data, error } = await sbClient
      .from('customers')
      .insert({
        customer_number: c.customer_number,
        name:            c.name,
        phone:           c.phone,
        email:           c.email
      })
      .select(); // 保存された行を返してもらい確認
    if (error) throwSupabaseError('顧客登録', error);
    console.log('✅ [saveCustomer] INSERT完了 保存行:', data);
    return data;
  }

      flow: ST.flow, menu: ST.menu,
      name, phone, email,
      returnTo: 'page-member-register'
    }));
    sessionStorage.setItem('lineState', state);
    const params = new URLSearchParams({
      response_type: 'code',
      client_id: '2004833107',
      redirect_uri: 'https://lactive-okayama.github.io/lactive-booking/',
      state,
      scope: 'profile openid'
    });
    window.location.href = 'https://access.line.me/oauth2/v2.1/authorize?' + params.toString();
  }

  async function handleLineCallback() {
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    if (!code) return;

    // URLからクエリパラメータを除去
    window.history.replaceState({}, document.title, window.location.pathname);

    const savedRaw = sessionStorage.getItem('lineLoginState');
    if (!savedRaw) return;
    const saved = JSON.parse(savedRaw);
    sessionStorage.removeItem('lineLoginState');
    sessionStorage.removeItem('lineState');

    // フロー状態を復元
    if (saved.flow) {
      ST.flow = saved.flow;
      ST.menu = saved.menu || '';
    }
    // ページへ遷移
    navigateTo(saved.returnTo || 'page-member-register');

    // 登録フォームを確実に表示（以前に submitRegister を経由していた場合に備え）
    const _formSec = document.getElementById('register-form-section');
    const _doneSec = document.getElementById('register-done-section');
    if (_formSec) _formSec.style.display = 'block';
    if (_doneSec) _doneSec.style.display = 'none';

    // フォーム値を復元（即時＋DOM描画後の念押し）
    const _restoreInputs = () => {
      const nameEl  = document.getElementById('r-name');
      const phoneEl = document.getElementById('r-phone');
      const emailEl = document.getElementById('r-email');
      if (nameEl  && saved.name  !== undefined) nameEl.value  = saved.name;
      if (phoneEl && saved.phone !== undefined) phoneEl.value = saved.phone;
      if (emailEl && saved.email !== undefined) emailEl.value = saved.email;
    };
    _restoreInputs();
    setTimeout(_restoreInputs, 80);

    // LINE認証コードをユーザーIDに交換
    showLoading('LINE認証中...');
    try {
      const SUPABASE_URL = 'https://wuthbgxzmvjeosugzfbs.supabase.co';
      const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dGhiZ3h6bXZqZW9zdWd6ZmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTIyNjUsImV4cCI6MjA5MjQyODI2NX0.auAsEpJN1yPiBtX79TKzDX-xBFiC1-fDl25z3F-eSrY';
      const res = await fetch(`${SUPABASE_URL}/functions/v1/line-auth`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${ANON_KEY}`
        },
        body: JSON.stringify({
          code,
          redirect_uri: 'https://lactive-okayama.github.io/lactive-booking/'
        })
      });
      if (!res.ok) throw new Error('LINE認証に失敗しました');
      const data = await res.json();
      if (data.line_user_id) {
        ST.lineUserId = data.line_user_id;
        // 連携済みバッジを表示 / ボタンを非表示
        const statusEl = document.getElementById('line-connect-status');
        const btnEl    = document.getElementById('line-connect-btn');
        if (statusEl) statusEl.style.display = 'block';
        if (btnEl)    btnEl.style.display    = 'none';
        // 成功アラートを目立つ形で表示
        const alertEl = document.getElementById('register-alert');
        if (alertEl) {
          alertEl.className = 'alert alert-success show';
          alertEl.textContent = '✅ LINEと連携しました！予約前日にリマインドメッセージが届きます。';
          alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        console.log('✅ [LINE連携] 成功:', data.display_name);
      } else {
        throw new Error('line_user_idが取得できませんでした');
      }
    } catch (e) {
      console.error('❌ [LINE連携] エラー:', e);
      const alertEl = document.getElementById('register-alert');
      if (alertEl) {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = '⚠️ LINE連携に失敗しました。もう一度お試しください。';
        alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    } finally {
      hideLoading();
    }
  }
