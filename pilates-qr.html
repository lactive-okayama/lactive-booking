<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LACTIVE Pilates QRコード</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: #7A7068;
    }

    /* カード */
    .qr-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 52px;
      box-shadow: 0 8px 48px rgba(44,36,32,.1);
      border: 1px solid rgba(181,96,122,.12);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: .22em;
      color: #8B3F5A;
      margin-bottom: 4px;
    }
    .logo span { color: #C9A46A; }
    .logo-sub {
      font-size: 10px;
      letter-spacing: .25em;
      color: #7A7068;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* QRコード */
    .qr-wrap {
      display: inline-flex;
      align-items: center; justify-content: center;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(181,96,122,.18);
      margin-bottom: 24px;
      background: #fff;
    }
    #qrcode { display: flex; justify-content: center; align-items: center; }
    #qrcode canvas,
    #qrcode img { display: block; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(181,96,122,.2); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: #B5607A; transform: rotate(45deg); flex-shrink: 0;
    }

    .qr-label {
      font-size: 13px;
      font-weight: 500;
      color: #2C2420;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .qr-url {
      font-size: 11px;
      color: #7A7068;
      letter-spacing: .04em;
      word-break: break-all;
      line-height: 1.7;
    }

    .qr-note {
      font-size: 11px;
      color: #B5607A;
      letter-spacing: .1em;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px dashed rgba(181,96,122,.2);
    }

    /* 操作ボタン */
    .actions {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      letter-spacing: .08em;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      border: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, #B5607A, #8B3F5A);
      color: #fff;
      box-shadow: 0 4px 16px rgba(139,63,90,.3);
    }
    .btn-secondary {
      background: #fff;
      color: #8B3F5A;
      border: 1px solid rgba(181,96,122,.4);
    }

    /* 印刷 */
    @media print {
      body { background: #fff; padding: 0; gap: 0; }
      .actions { display: none; }
      h1 { display: none; }
      .qr-card {
        box-shadow: none;
        border: 1px solid #eee;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <h1>LACTIVE Pilates — QR Code</h1>

  <div class="qr-card">
    <p class="logo">L<span>A</span>CTIVE</p>
    <p class="logo-sub">Osteopathic Personal Pilates</p>

    <div class="qr-wrap">
      <div id="qrcode"></div>
    </div>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-diamond"></span>
      <span class="divider-line"></span>
    </div>

    <p class="qr-label">ピラティスLP・ご予約はこちら</p>
    <p class="qr-url" id="urlText">https://lactive-okayama.github.io/lactive-booking/pilates.html</p>

    <p class="qr-note">📱 カメラで読み取るとLPが開きます</p>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">🖨 印刷する</button>
    <button class="btn btn-secondary" onclick="downloadQR()">⬇ PNG保存</button>
  </div>

  <script>
    const LP_URL = 'https://lactive-okayama.github.io/lactive-booking/pilates.html';

    new QRCode(document.getElementById('qrcode'), {
      text: LP_URL,
      width: 200,
      height: 200,
      colorDark: '#2C2420',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const c = document.querySelector('#qrcode canvas');
      if (!c) return;
      const link = document.createElement('a');
      link.download = 'lactive-pilates-qr.png';
      link.href = c.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
